site_name: MatChavez.com
site_url: https://matchavez.com/
site_description: "Mat Chavez's personal reference site and digital garden — notes on notetaking, golf, Apple, and more."
site_author: Mat Chavez
theme: 
  name: material
  custom_dir: overrides
  favicon: images/favicon.png
  features:
    - navigation.tabs
    - content.action.edit
  language: en
  palette: 

    # Palette toggle for light mode
    - scheme: default
      toggle:
        icon: lucide/sun
        name: Switch to dark mode

    # Palette toggle for dark mode
    - scheme: slate
      toggle:
        icon: lucide/moon
        name: Switch to light mode
  font: false
extra_css:
  - stylesheets/extra.css
extra_javascript:
  - javascripts/extra.js
repo_url: https://github.com/matchavez/matchavez.github.io
edit_uri: edit/main/docs/
validation: false

# ----------------------------------------------------------------

# NAV PAGE TREE

nav:
  - Welcome: index.md
  - Notetaking:
    - All about notes: notetaking.md
    - Winner First: notetaking/winner_first.md
    - Applications: notetaking/applications.md
    - GFM vs. JSON: notetaking/gfm_json.md
  - Favourite Quotes: favourite_quotes.md
  - Golf:
    - Tournaments: golf/tourneys.md
    - Equipment: golf/equipment.md
    - Chch Info: golf/Christchurch Golf Information.md
  - Apple:
    - Fixes: apple/fixes.md
    - Commands: apple/commands.md
  - Projects:
    - Stream Test: projects/streaming.md
    - Tellyhoova: projects/tellyhoova.md
    - Dumptruck: projects/sdumptruck.md
  - Test Pages:
#    - Sandbox: unit_testing.md 
#    - Include Test: testsnip.md
    - Typography: typography.md
    - Linux Shortcuts: linux_shortcuts.md
#    - CMS Steps: steps.md


#    - "": _workstuff.md


# ----------------------------------------------------------------

# EXTENSIONS

markdown_extensions:
  - pymdownx.snippets:
      base_path: docs
      check_paths: true
  - admonition
  - abbr
  - attr_list
  - def_list
  - footnotes
  - meta
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:materialx.emoji.twemoji
      emoji_generator: !!python/name:materialx.emoji.to_svg
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: squidfunk
      repo: mkdocs-material
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

plugins:
  - gh-admonitions

  # ----------------------------------------------------------------
