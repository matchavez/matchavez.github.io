<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex">
<title>404 — MatChavez.com</title>
<link rel="icon" href="/images/favicon.png">
<style>
  @font-face {
    font-family: "Inter";
    src: url("/stylesheets/fonts/InterFreeze.var.woff2") format("woff2");
    font-weight: 100 900;
    font-display: swap;
  }
  :root {
    --bg: #ebe2c1; --ink: #2f2d27; --muted: #5c6360;
    --red: #e0322f; --link: #1d4ed8; --line: #2f2d27;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0a1014; --ink: #c9cdcc; --muted: #9ca3af;
      --red: #e0322f; --link: #3b82f6; --line: #c9cdcc;
    }
  }
  * { margin: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--ink);
    font-family: "Inter", system-ui, sans-serif;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 2rem; text-align: center;
  }
  .code { font-size: clamp(64px, 14vw, 120px); font-weight: 700; color: var(--red); letter-spacing: -0.03em; line-height: 1; }
  figure { margin: 1.5rem 0 0; }
  .quote { font-size: clamp(18px, 3vw, 24px); line-height: 1.4; max-width: 28ch; margin: 1.6rem auto 0.4rem; font-style: italic; }
  .attr { color: var(--muted); font-size: 14px; }
  .home { display: inline-block; margin-top: 2rem; color: var(--link); font-size: 17px; text-underline-offset: 0.18em; text-decoration-thickness: 1px; }
  .home:hover { text-decoration-thickness: 2px; }
  svg { display: block; margin: 0 auto; }
  .ears { font-size: 40px; }
  @media (prefers-reduced-motion: no-preference) {
    .head-group { animation: look 5s ease-in-out infinite; transform-origin: 100px 58px; }
    @keyframes look {
      0%, 40%, 100% { transform: rotate(0deg); }
      50%, 70% { transform: rotate(-9deg); }
      80%, 90% { transform: rotate(7deg); }
    }
  }
</style>
</head>
<body>
<main>
  <div class="code">404</div>

  <figure aria-hidden="true">
    <svg width="200" height="210" viewBox="0 0 200 210" fill="none" stroke="var(--line)" stroke-width="4" stroke-linecap="round">
      <g class="head-group" stroke="none">
        <text x="100" y="40" text-anchor="middle" class="ears" font-size="44" fill="#000" stroke="none" style="fill:initial">🐰</text>
      </g>
      <circle cx="100" cy="62" r="18"/>
      <line x1="100" y1="80" x2="100" y2="138"/>
      <line x1="100" y1="95" x2="62"  y2="78"/>
      <line x1="62"  y1="78" x2="56"  y2="56"/>
      <line x1="100" y1="95" x2="138" y2="110"/>
      <line x1="138" y1="110" x2="158" y2="100"/>
      <line x1="100" y1="138" x2="76"  y2="180"/>
      <line x1="100" y1="138" x2="124" y2="180"/>
      <path d="M150 96 q6 -8 0 -14" />
      <path d="M158 92 q10 -12 0 -24" opacity="0.6"/>
      <circle cx="94" cy="60" r="1.5" fill="var(--line)" stroke="none"/>
      <circle cx="106" cy="60" r="1.5" fill="var(--line)" stroke="none"/>
      <path d="M93 70 q7 -4 14 0" />
    </svg>
  </figure>

  <p class="quote">“I knew I shoulda taken that left turn at Albuquerque.”</p>
  <p class="attr">— Bugs Bunny, on pages that don't exist</p>

  <a class="home" href="/">Take the left turn home</a>
</main>
</body>
</html>
